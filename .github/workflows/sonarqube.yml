name: SonarQube

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main, test ]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate SonarQube configuration
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Missing GitHub secret SONAR_TOKEN"
            exit 1
          fi
        shell: bash

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0

      - name: Show SonarQube analysis links
        run: |
          echo "Report task file:"
          cat .scannerwork/report-task.txt
          echo ""
          echo "Dashboard URL:"
          grep '^dashboardUrl=' .scannerwork/report-task.txt | cut -d'=' -f2-
          echo ""
          echo "Compute Engine task URL:"
          grep '^ceTaskUrl=' .scannerwork/report-task.txt | cut -d'=' -f2-
        shell: bash

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Show SonarQube Quality Gate status
        run: echo "SonarQube Quality Gate status = ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"
